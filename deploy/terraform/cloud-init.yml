#cloud-config

package_update: true

packages:
  - docker.io
  - jq

runcmd:
  - systemctl enable docker
  - systemctl start docker

  - useradd -r -m -s /bin/false lattice || true
  - mkdir -p /var/lib/lattice
  - chown lattice:lattice /var/lib/lattice

  - docker pull ${docker_image}

  - docker rm -f lattice-miner 2>/dev/null || true

  - |
    docker run -d \
      --name lattice-miner \
      --restart unless-stopped \
      --network host \
      -v /var/lib/lattice:/home/lattice/.lattice \
      ${docker_image} \
      --mine Nexus \
      --port ${p2p_port} \
      --data-dir /home/lattice/.lattice

  - |
    cat > /usr/local/bin/lattice-update <<'SCRIPT'
    #!/bin/bash
    set -e
    echo "Pulling latest image..."
    docker pull ${docker_image}
    echo "Restarting miner..."
    docker rm -f lattice-miner 2>/dev/null || true
    docker run -d \
      --name lattice-miner \
      --restart unless-stopped \
      --network host \
      -v /var/lib/lattice:/home/lattice/.lattice \
      ${docker_image} \
      --mine Nexus \
      --port ${p2p_port} \
      --data-dir /home/lattice/.lattice \
      "$@"
    echo "Done. Check: docker logs -f lattice-miner"
    SCRIPT
    chmod +x /usr/local/bin/lattice-update

  - |
    cat > /usr/local/bin/lattice-status <<'SCRIPT'
    #!/bin/bash
    echo "=== Lattice Node Status ==="
    echo "Container:"
    docker ps --filter name=lattice-miner --format "  Status: {{.Status}}"
    echo ""
    echo "Logs (last 20 lines):"
    docker logs --tail 20 lattice-miner 2>&1
    echo ""
    echo "Data dir:"
    du -sh /var/lib/lattice
    SCRIPT
    chmod +x /usr/local/bin/lattice-status

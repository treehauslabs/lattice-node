app = "lattice-bootstrap"
primary_region = "iad"

[build]
  image = "ghcr.io/treehauslabs/lattice-node:main"

[processes]
  miner = "--mine Nexus --port 4001 --data-dir /data --memory 0.128 --disk 1.0 --mempool 32 --mining-batch 10000"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["miner"]

[mounts]
  source = "lattice_data"
  destination = "/data"
  initial_size = 1
  auto_extend_size_threshold = 80
  auto_extend_size_increment = 1
  auto_extend_size_limit = 10

[[services]]
  internal_port = 4001
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 4001

# Fly.io config for the Lattice testnet faucet.
# Deploy:
#   fly apps create lattice-faucet
#   fly secrets set LATTICE_FAUCET_KEY=<private-key-hex> -a lattice-faucet
#   fly deploy --config deploy/fly/fly-faucet.toml -a lattice-faucet

app = "lattice-faucet"
primary_region = "ord"

[build]
  image = "ghcr.io/treehauslabs/lattice-node:main"

[env]
  NODE_URL = "https://lattice-testnet-1.fly.dev"
  FAUCET_AMOUNT = "1000000"
  FAUCET_COOLDOWN = "3600"

[processes]
  app = "faucet --node-url https://lattice-testnet-1.fly.dev --port 8090 --amount 1000000 --cooldown 3600 --chain Nexus"

[[services]]
  internal_port = 8090
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  [[services.ports]]
    port = 80
    handlers = ["http"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

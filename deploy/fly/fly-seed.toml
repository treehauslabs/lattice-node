# Fly.io config for a Lattice discovery-only bootstrap node.
#
# Deploy:
#   fly apps create lattice-seed-1
#   fly volumes create lattice_data --region ord --size 1 -a lattice-seed-1
#   fly deploy --config deploy/fly/fly-seed.toml -a lattice-seed-1
#   fly ips allocate-v4 -a lattice-seed-1
#
# Repeat with lattice-seed-2, lattice-seed-3 in different regions.
# Then use `fly-bootstrap.sh` to wire them together.

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "lattice_data"
  destination = "/data"

[processes]
  seed = "node --discovery-only --port 4001 --data-dir /data"

[[services]]
  internal_port = 4001
  protocol = "tcp"
  processes = ["seed"]
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  [[services.ports]]
    port = 4001

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

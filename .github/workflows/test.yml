name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-macos:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-macos-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-macos-

      - name: Build
        run: swift build -c release

      - name: Run tests
        run: swift test

      - name: Verify executable runs
        run: swift run LatticeNode --help

  test-linux:
    runs-on: ubuntu-latest
    container: swift:6.0-jammy
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install JSC for Linux
        run: |
          apt-get update && apt-get install -y --no-install-recommends libjavascriptcoregtk-4.1-dev

      - name: Build
        run: swift build -c release

      - name: Run tests
        run: swift test

      - name: Verify executable runs
        run: swift run LatticeNode --help
